[profile.default]
src = "contracts"
out = "out"
test = "contracts/test"
libs = ["lib"]
solc_version = "0.8.23"
evm_version = "paris"
remappings = [
    "@account-abstraction/=lib/account-abstraction/contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[profile.default.fmt]
line_length = 100

[rpc_endpoints]
base_sepolia = "${RPC_URL_BASE_SEPOLIA}"
base = "${RPC_URL_BASE}"

# For deploy scripts: use FOUNDRY_ACCOUNT=deployer-onetruehomie (or set DEPLOYER_PRIVATE_KEY).
# Keystore account name is passed via --account in scripts; no profile needed.
